<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; font-family: 'Segoe UI', Arial; padding: 15px; background: #1a1a1a; color: #fff; }
    .container { border: 1px solid #444; border-radius: 10px; padding: 15px; background: #2d2d2d; }
    h2 { margin: 0 0 15px 0; font-size: 18px; color: #00e676; text-align: center; }
    .info { background: #3d3d3d; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 13px; line-height: 1.6; }
    .stat-row { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 5px 0; }
    .val { font-weight: bold; color: #ffeb3b; }
    button { width: 100%; padding: 12px; background: #00e676; border: none; border-radius: 5px; color: #000; font-weight: bold; cursor: pointer; font-size: 14px; }
    button:hover { background: #00c853; }
    button:disabled { background: #555; cursor: not-allowed; }
    #loader { display: none; text-align: center; color: #aaa; margin-top: 10px; font-style: italic; }
  </style>
</head>
<body>
  <div class="container">
    <h2>AlphaGo 实时分析</h2>
    <div class="info">
      <div class="stat-row"><span>当前状态:</span> <span id="status" class="val">就绪</span></div>
      <div id="results" style="display:none;">
        <div class="stat-row"><span>推荐落子:</span> <span id="move" class="val">-</span></div>
        <div class="stat-row"><span>黑棋胜率:</span> <span id="winrate" class="val">-</span></div>
        <div class="stat-row"><span>AI 深度:</span> <span id="depth" class="val">1500v</span></div>
      </div>
    </div>
    <button id="runBtn">获取并分析当前局面</button>
    <div id="loader">正在同步 OGS 棋盘数据并模拟计算...</div>
  </div>
  <script src="main.js"></script>
</body>
</html>
